<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4/23 佈道會時序畫布</title>
    <style>
        :root {
            --primary-gold: #D4AF37;
            --deep-blue: #1A2A6C;
            --accent-red: #e63946;
            --line-color: #e0e0e0;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .canvas-card {
            width: 100%;
            max-width: 550px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            overflow: hidden;
            position: relative;
        }

        /* 頂部裝飾 */
        .header {
            background-color: var(--deep-blue);
            color: white;
            padding: 40px 20px;
            text-align: center;
            border-bottom: 6px solid var(--primary-gold);
        }

        .header h1 { margin: 0; font-size: 28px; letter-spacing: 4px; }
        .header p { margin: 10px 0 0; opacity: 0.8; font-size: 18px; }

        /* 強化主題區塊 */
        .theme-container {
            padding: 30px 20px;
            text-align: center;
            background: #fffdf2;
        }

        .theme-label { font-size: 16px; color: #856404; font-weight: bold; display: block; margin-bottom: 8px; }
        .theme-title { 
            font-size: 44px; 
            font-weight: 900; 
            color: var(--deep-blue); 
            line-height: 1.2;
            margin: 10px 0;
        }
        .choir-tag {
            display: inline-block;
            background: var(--primary-gold);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 18px;
            margin-top: 10px;
        }

        /* 垂直時間軸優化 */
        .timeline-section {
            padding: 40px 30px;
            position: relative;
        }

        /* 垂直線 */
        .timeline-section::before {
            content: '';
            position: absolute;
            left: 35px;
            top: 40px;
            bottom: 40px;
            width: 3px;
            background: var(--line-color);
        }

        .timeline-item {
            position: relative;
            padding-left: 50px;
            margin-bottom: 30px;
        }

        /* 時間圓點 */
        .timeline-item::after {
            content: '';
            position: absolute;
            left: 0;
            top: 5px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--primary-gold);
            border: 3px solid white;
            box-shadow: 0 0 0 3px var(--line-color);
            z-index: 2;
        }

        .time-label {
            font-size: 16px;
            font-weight: 800;
            color: var(--deep-blue);
            margin-bottom: 4px;
            display: block;
        }

        .activity-text {
            font-size: 18px;
            color: #333;
            line-height: 1.5;
        }

        /* 重點行程樣式 */
        .special-item {
            background: #fff5f5;
            padding: 15px;
            border-radius: 12px;
            border-left: 4px solid var(--accent-red);
        }

        /* 頁尾資訊 */
        .footer {
            background: #f8f9fa;
            padding: 30px;
            text-align: center;
            font-size: 14px;
            color: #666;
            border-top: 1px solid #eee;
        }

        .footer b { color: var(--deep-blue); }

        @media (max-width: 480px) {
            .theme-title { font-size: 32px; }
            .timeline-section { padding: 30px 20px; }
            .timeline-section::before { left: 25px; }
            .timeline-item::after { left: -10px; }
        }
    </style>
</head>
<body>

<div class="canvas-card">
    <div class="header">
        <h1>4/23 佈道會行程</h1>
        <p>使人有盼望的神 - 第一天</p>
    </div>

    <div class="theme-container">
        <span class="theme-label">TODAY'S THEME</span>
        <div class="theme-title">『使人有盼望的神』</div>
        <div class="choir-tag">🎵 獻詩：大溪學生團契</div>
    </div>

    <div class="timeline-section">
        <div class="timeline-item">
            <span class="time-label">06:40 - 07:00</span>
            <div class="activity-text">早禱 (配合團契)</div>
        </div>

        <div class="timeline-item">
            <span class="time-label">07:00 - 08:00</span>
            <div class="activity-text">早餐</div>
        </div>

        <div class="timeline-item">
            <span class="time-label" style="color: #0d9488;">09:00 - 14:00</span>
            <div class="activity-text" style="color: #0d9488; font-weight: bold;">對外訪問行程</div>
        </div>

        <div class="timeline-item">
            <span class="time-label">17:00 - 18:30</span>
            <div class="activity-text">全體禱告會 ➔ 晚餐時間</div>
        </div>

        <div class="timeline-item">
            <span class="time-label">19:00 - 19:30</span>
            <div class="activity-text">晚間預備：禱告與詩頌</div>
        </div>

        <div class="timeline-item">
            <div class="special-item">
                <span class="time-label" style="color: var(--accent-red);">19:30 - 21:00</span>
                <div class="activity-text">
                    <b style="font-size: 20px;">第一天佈道會 (含禱告)</b><br>
                    <small>講題：使人有盼望的神</small>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <b>發行單位：TJC大溪教會職務會 製作</b><br>
        願神祝福今日的聖工與腳蹤
    </div>
</div>

</body>
</html>
