<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4/23 行程時序表 - 使人有盼望的神</title>
    <style>
        :root {
            --primary-gold: #D4AF37;
            --deep-blue: #1A2A6C;
            --bg-color: #f4f7f6;
            --text-color: #333;
        }

        body {
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .canvas-container {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            overflow: hidden;
            border-top: 10px solid var(--primary-gold);
        }

        /* 標頭設計 */
        .header {
            background-color: var(--deep-blue);
            color: white;
            padding: 35px 20px;
            text-align: center;
        }

        .header h1 { margin: 0; font-size: 26px; letter-spacing: 3px; }
        .header p { margin: 10px 0 0; opacity: 0.8; font-weight: 300; }

        /* 主題盒：極致顯眼增大 */
        .theme-box {
            background: linear-gradient(135deg, #fffbe6 0%, #fff5cc 100%);
            margin: 25px;
            padding: 35px 15px;
            border: 3px solid var(--primary-gold);
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.3);
        }

        .theme-label {
            font-size: 18px;
            color: #856404;
            letter-spacing: 2px;
            display: block;
            margin-bottom: 12px;
            font-weight: bold;
        }

        .theme-title {
            color: var(--deep-blue);
            font-size: 42px; /* 特大字體 */
            font-weight: 900;
            display: block;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            letter-spacing: 2px;
            line-height: 1.3;
        }

        /* 時序表內容 */
        .timeline {
            padding: 10px 30px 30px 30px;
        }

        .event {
            display: flex;
            align-items: flex-start;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }

        .time {
            min-width: 110px;
            font-size: 18px;
            font-weight: 800;
            color: var(--deep-blue);
            font-family: Arial, sans-serif;
        }

        .activity {
            flex-grow: 1;
            font-size: 18px;
            padding-left: 10px;
        }

        .highlight {
            color: #e63946;
            font-weight: bold;
            font-size: 20px;
        }

        .footer {
            text-align: center;
            padding: 20px;
            font-size: 13px;
            color: #999;
            background: #fafafa;
        }

        /* 手機版優化 */
        @media (max-width: 480px) {
            .theme-title { font-size: 32px; }
            .time { min-width: 90px; font-size: 16px; }
            .activity { font-size: 16px; }
        }
    </style>
</head>
<body>

<div class="canvas-container">
    <div class="header">
        <h1>4/23 行程時序表</h1>
        <p>週四 | 第一天行程安排</p>
    </div>

    <div class="theme-box">
        <span class="theme-label">今日佈道主題</span>
        <span class="theme-title">『使人有盼望的神』</span>
    </div>

    <div class="timeline">
        <div class="event">
            <div class="time">06:40 - 07:00</div>
            <div class="activity">早禱 (配合團契)</div>
        </div>
        
        <div class="event">
            <div class="time">07:00 - 08:00</div>
            <div class="activity">早餐</div>
        </div>
        
        <div class="event" style="background: #f0fdfa; border-radius: 8px; padding: 10px;">
            <div class="time" style="color: #0d9488;">09:00 - 14:00</div>
            <div class="activity" style="color: #0d9488; font-weight: bold;">訪問行程</div>
        </div>
        
        <div class="event">
            <div class="time">17:00 - 17:30</div>
            <div class="activity">全體禱告會</div>
        </div>
        
        <div class="event">
            <div class="time">17:30 - 18:30</div>
            <div class="activity">晚餐</div>
        </div>
        
        <div class="event">
            <div class="time">19:00 - 19:20</div>
            <div class="activity">禱告</div>
        </div>

        <div class="event">
            <div class="time">19:20 - 19:30</div>
            <div class="activity">詩頌</div>
        </div>
        
        <div class="event" style="border-bottom: none;">
            <div class="time">19:30 - 21:00</div>
            <div class="activity">
                <span class="highlight">第一天佈道會 (含禱告)</span><br>
                <span style="color: #555; font-size: 15px;">主題：使人有盼望的神</span>
            </div>
        </div>
    </div>

    <div class="footer">
        願神祝福今日的聖工與腳蹤
    </div>
</div>

</body>
</html>
